<style>
  :root {
    --bg-primary: #050507; --bg-card: #0c0e15;
    --text-primary: #ffffff; --text-secondary: #c8d0e0; --text-muted: #6b7a94;
    --accent-blue: #4a7dff; --border: rgba(255,255,255,0.05);
    --font-display: 'Outfit', sans-serif; --font-body: 'Lato', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; width: 100%; max-width: 100%; }
  body {
    font-family: var(--font-body); background: #030305; color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
  }
  #starfield {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
  }
  /* --- CHAT SCREEN --- */
  #chat-screen {
    display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    flex-direction: column; z-index: 10;
    overflow: hidden;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }
  header {
    position: relative; z-index: 10;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(5, 5, 7, 0.88);
    backdrop-filter: blur(24px);
    flex-shrink: 0;
  }
  header h1 {
    font-family: var(--font-display); font-weight: 300; font-size: 1.1rem;
    letter-spacing: 0.22em; text-transform: uppercase;
  }
  header .badge {
    font-family: var(--font-display);
    padding: 0.25rem 0.8rem; border-radius: 20px; font-size: 0.68rem;
    letter-spacing: 0.1em; text-transform: none; font-weight: 300;
    border: 1px solid rgba(74, 125, 255, 0.3); color: var(--accent-blue);
    background: rgba(74, 125, 255, 0.06);
  }
  #messages {
    position: relative; z-index: 10;
    flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: flex;
    flex-direction: column; gap: 1rem;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  .msg {
    max-width: 720px; padding: 0.85rem 1.1rem; border-radius: 14px;
    font-size: 0.9rem; line-height: 1.65; font-weight: 300; color: var(--text-secondary);
    white-space: pre-wrap; word-wrap: break-word;
    position: relative;
  }
  .msg.bot {
    align-self: flex-start;
    background: transparent;
    border: none;
  }
  .msg-actions {
    display: flex; justify-content: flex-end; align-items: center;
    gap: 0.15rem; margin-top: 0.5rem; clear: both;
  }
  .copy-btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer;
    opacity: 0.5; transition: opacity 0.2s;
    padding: 0.3rem; border-radius: 6px;

  .copy-btn:hover, .copy-btn:active { background: rgba(255,255,255,0.08); }
  .copy-btn svg { width: 15px; height: 15px; fill: none; stroke: var(--text-muted); stroke-width: 1.8; }
  .copy-btn.copied svg { stroke: var(--accent-blue); }
  .msg.bot:hover .copy-btn { opacity: 1; }
  .msg.user {
    align-self: flex-end;
    background: transparent;
    border: none;
    color: #ffffff;
  }
  .msg.typing { color: var(--text-muted); font-style: italic; }
  .msg.typing .dots { display: inline-block; }
  .msg.typing .dots span {
    animation: blink 1.4s infinite both;
    font-style: normal; font-size: 1.1em;
  }
  .msg.typing .dots span:nth-child(2) { animation-delay: 0.2s; }
  .msg.typing .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
  /* Header controls */
  .header-right {
    display: flex; align-items: center; gap: 0.6rem;
  }

  /* Input area - single unified wrapper, mirrors the mini widget */

    position: relative; z-index: 10;
    padding: 1rem 2rem 1.2rem;

  #mic-btn {

    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    width: 38px; height: 38px; min-width: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    margin-right: 0.5rem;
    transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    position: relative; flex-shrink: 0;
  }
  #mic-btn svg {
    width: 16px; height: 16px;
    stroke: var(--text-muted); fill: none;
    stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round;
    transition: stroke 0.15s ease;
  }
  #mic-btn:hover:not(:disabled) { background: rgba(74, 125, 255, 0.08); border-color: rgba(74, 125, 255, 0.35); }
  #mic-btn:hover:not(:disabled) svg { stroke: var(--accent-blue); }
  #mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #mic-btn.recording {
    background: rgba(255, 97, 115, 0.15);
    border-color: rgba(255, 97, 115, 0.45);
    animation: mic-pulse 1.6s ease-in-out infinite;
  }
  #mic-btn.recording svg { stroke: #ff6173; }
  #mic-btn.transcribing { border-color: rgba(74, 125, 255, 0.35); }
  #mic-btn.transcribing svg {
    stroke: var(--accent-blue);
    animation: mic-spin 0.8s linear infinite;
    transform-origin: 50% 50%;
  }
  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 97, 115, 0.45); }
    50%      { box-shadow: 0 0 0 8px rgba(255, 97, 115, 0); }
  }
  @keyframes mic-spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) {
    #mic-btn.recording { animation: none; }
    #mic-btn.transcribing svg { animation: none; }
  }

  #send-btn {
    background: var(--accent-blue); border: none; border-radius: 10px;
    width: 38px; height: 38px; min-width: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    margin-left: 0.5rem;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #6b9aff; }
  #send-btn:disabled { background: #2a3a5a; cursor: not-allowed; }
  #send-btn svg { width: 16px; height: 16px; fill: white; }

  .speak-btn {
    display: inline-flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer; padding: 0.3rem;
    border-radius: 6px; opacity: 0.5; transition: opacity 0.2s;
  }
  .speak-btn:hover, .speak-btn:active { background: rgba(255,255,255,0.08); }
  .speak-btn svg { width: 13px; height: 13px; fill: var(--text-muted); stroke: none; transition: fill 0.15s; }
  .speak-btn.playing svg { fill: var(--accent-blue); }
  .msg.bot:hover .speak-btn { opacity: 1; }

  footer {
    position: relative; z-index: 10;
    padding: 0.5rem 2rem; text-align: center; font-size: 0.62rem;
    color: var(--text-muted); font-weight: 300; flex-shrink: 0;
    background: rgba(5, 5, 7, 0.88);
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  @media (max-width: 600px) {
    #messages { padding: 1rem; }
    #input-area { padding: 0.75rem 0.75rem; }
    .input-wrap { padding: 0.3rem 0.3rem 0.3rem 0.85rem; border-radius: 12px; }
    #question { font-size: 16px; }
    #send-btn, #mic-btn { width: 34px; height: 34px; min-width: 34px; }
    header { padding: 0.75rem 1rem; }
    footer { padding: 0.5rem 1rem; font-size: 0.58rem; }
  }
</style>

<!-- STARFIELD -->
<script>
(function(){
  var canvas = document.getElementById('starfield');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(window.devicePixelRatio || 1, 2);
  var mouseX = 0.5, mouseY = 0.5;
  var smoothX = 0.5, smoothY = 0.5;
  document.addEventListener('mousemove', function(e){
    mouseX = e.clientX / window.innerWidth;
    mouseY = e.clientY / window.innerHeight;
  });
  var nebulaCanvas = document.createElement('canvas');
  var nebulaCtx = nebulaCanvas.getContext('2d');
  function buildNebula(){
    var w = window.innerWidth, h = window.innerHeight;
    nebulaCanvas.width = w;
    nebulaCanvas.height = h;
    nebulaCtx.clearRect(0, 0, w, h);
    var blobs = [
      {x: 0.2, y: 0.15, radius: 0.35, r: 30, g: 20, b: 80, a: 0.035},
      {x: 0.75, y: 0.3, radius: 0.3, r: 15, g: 40, b: 90, a: 0.03},
      {x: 0.5, y: 0.7, radius: 0.4, r: 20, g: 15, b: 60, a: 0.025},
      {x: 0.85, y: 0.8, radius: 0.25, r: 40, g: 20, b: 70, a: 0.03},
      {x: 0.1, y: 0.6, radius: 0.28, r: 10, g: 30, b: 65, a: 0.025}
    ];
    for(var i = 0; i < blobs.length; i++){
      var bl = blobs[i];
      var cx = bl.x * w, cy = bl.y * h;
      var rad = bl.radius * Math.max(w, h);
      var ng = nebulaCtx.createRadialGradient(cx, cy, 0, cx, cy, rad);
      ng.addColorStop(0, 'rgba(' + bl.r + ',' + bl.g + ',' + bl.b + ',' + bl.a + ')');
      ng.addColorStop(0.5, 'rgba(' + bl.r + ',' + bl.g + ',' + bl.b + ',' + (bl.a * 0.4) + ')');
      ng.addColorStop(1, 'rgba(0,0,0,0)');
      nebulaCtx.fillStyle = ng;
      nebulaCtx.fillRect(0, 0, w, h);
    }
  }
  function resize(){
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildNebula();
  }
  resize();
  window.addEventListener('resize', resize);
  var layerConfig = [
    {driftMult: 0.5, parallax: 4, sizeMult: 0.7},
    {driftMult: 1.0, parallax: 10, sizeMult: 1.0},
    {driftMult: 1.8, parallax: 20, sizeMult: 1.3}
  ];
  var STARS = 400;
  var stars = [];
  for(var i = 0; i < STARS; i++){
    var sizeRoll = Math.random();
    var size;
    if(sizeRoll < 0.65) size = 0.3 + Math.random() * 0.4;
    else if(sizeRoll < 0.88) size = 0.6 + Math.random() * 0.5;
    else if(sizeRoll < 0.97) size = 1.0 + Math.random() * 0.5;
    else size = 1.3 + Math.random() * 0.7;
    var cRoll = Math.random();
    var r, g, b;
    if(cRoll < 0.5){ r=230; g=235; b=255; }
    else if(cRoll < 0.7){ r=190; g=210; b=255; }
    else if(cRoll < 0.85){ r=170; g=220; b=255; }
    else if(cRoll < 0.93){ r=200; g=185; b=255; }
    else{ r=255; g=225; b=190; }
    var layerRoll = Math.random();
    var layer = layerRoll < 0.45 ? 0 : (layerRoll < 0.8 ? 1 : 2);
    var lc = layerConfig[layer];
    stars.push({
      x: Math.random(), y: Math.random(),
      size: size * lc.sizeMult, r: r, g: g, b: b,
      phase: Math.random() * Math.PI * 2,
      speed: 0.3 + Math.random() * 1.0,
      driftX: (Math.random() - 0.5) * 0.000018 * lc.driftMult,
      driftY: (Math.random() - 0.5) * 0.000018 * lc.driftMult,
      glowMult: 4 + Math.random() * 6,
      layer: layer,
      parallax: lc.parallax
    });
  }
  var shooters = [];
  var lastShootTime = 0;
  function spawnShooter(){
    var startX = Math.random() * 0.7 + 0.1;
    var startY = Math.random() * 0.3;
    var angle = Math.PI * 0.12 + Math.random() * Math.PI * 0.25;
    var spd = 0.35 + Math.random() * 0.35;
    var len = 80 + Math.random() * 140;
    shooters.push({
      x: startX, y: startY, angle: angle, speed: spd,
      len: len, life: 0, maxLife: 1.0 + Math.random() * 0.6,
      r: 200 + Math.floor(Math.random()*55),
      g: 220 + Math.floor(Math.random()*35),
      b: 255
    });
  }
  function animate(time){
    requestAnimationFrame(animate);
    var t = time * 0.001;
    var w = window.innerWidth, h = window.innerHeight;
    ctx.clearRect(0, 0, w, h);
    smoothX += (mouseX - smoothX) * 0.04;
    smoothY += (mouseY - smoothY) * 0.04;
    var offsetBaseX = (smoothX - 0.5);
    var offsetBaseY = (smoothY - 0.5);
    var nebulaPulse = 0.7 + 0.3 * Math.sin(t * 0.08);
    ctx.globalAlpha = nebulaPulse;
    ctx.drawImage(nebulaCanvas, offsetBaseX * -8, offsetBaseY * -8, w, h);
    ctx.globalAlpha = 1.0;
    for(var i = 0; i < stars.length; i++){
      var s = stars[i];
      s.x += s.driftX; s.y += s.driftY;
      if(s.x < -0.05) s.x = 1.05; if(s.x > 1.05) s.x = -0.05;
      if(s.y < -0.05) s.y = 1.05; if(s.y > 1.05) s.y = -0.05;
      var twinkle = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      var glowPulse = 0.5 + 0.5 * Math.sin(t * s.speed * 0.6 + s.phase * 1.5);
      var px = s.x * w + offsetBaseX * s.parallax;
      var py = s.y * h + offsetBaseY * s.parallax;
      var glowAlpha = twinkle * 0.12 * glowPulse;
      if(glowAlpha > 0.01){
        var grad = ctx.createRadialGradient(px, py, 0, px, py, s.size * s.glowMult);
        grad.addColorStop(0, 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + glowAlpha + ')');
        grad.addColorStop(0.4, 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + (glowAlpha * 0.4) + ')');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        var gr = s.size * s.glowMult;
        ctx.fillRect(px - gr, py - gr, gr * 2, gr * 2);
      }
      ctx.beginPath();
      ctx.arc(px, py, s.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(' + s.r + ',' + s.g + ',' + s.b + ',' + (twinkle * 0.9) + ')';
      ctx.fill();
    }
    if(t - lastShootTime > 8 + Math.random() * 4){ spawnShooter(); lastShootTime = t; }
    for(var j = shooters.length - 1; j >= 0; j--){
      var sh = shooters[j];
      sh.life += 0.016;
      if(sh.life > sh.maxLife){ shooters.splice(j, 1); continue; }
      var progress = sh.life / sh.maxLife;
      var fade = progress < 0.15 ? progress / 0.15 : (1.0 - progress) / 0.85;
      fade = Math.max(0, Math.min(1, fade));
      var headX = (sh.x + Math.cos(sh.angle) * sh.speed * sh.life) * w;
      var headY = (sh.y + Math.sin(sh.angle) * sh.speed * sh.life) * h;
      var tailX = headX - Math.cos(sh.angle) * sh.len * fade;
      var tailY = headY - Math.sin(sh.angle) * sh.len * fade;
      var sg = ctx.createLinearGradient(tailX, tailY, headX, headY);
      sg.addColorStop(0, 'rgba(' + sh.r + ',' + sh.g + ',' + sh.b + ',0)');
      sg.addColorStop(0.6, 'rgba(' + sh.r + ',' + sh.g + ',' + sh.b + ',' + (fade * 0.35).toFixed(3) + ')');
      sg.addColorStop(1, 'rgba(255,255,255,' + (fade * 0.9).toFixed(3) + ')');
      ctx.strokeStyle = sg; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(tailX, tailY); ctx.lineTo(headX, headY); ctx.stroke();
      ctx.beginPath(); ctx.arc(headX, headY, 1.8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,' + (fade * 0.85).toFixed(3) + ')'; ctx.fill();
      var hGrad = ctx.createRadialGradient(headX, headY, 0, headX, headY, 6);
      hGrad.addColorStop(0, 'rgba(255,255,255,' + (fade * 0.3).toFixed(3) + ')');
      hGrad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = hGrad; ctx.fillRect(headX - 6, headY - 6, 12, 12);
    }
  }
  requestAnimationFrame(animate);
})();
</script>

<!-- APP LOGIC -->
<script>
(function(){
  var API = 'https://sv-agent.ir-def.workers.dev';
  var questionInput = document.getElementById('question');
  var sendBtn = document.getElementById('send-btn');
  var messages = document.getElementById('messages');
  var micBtn = document.getElementById('mic-btn');
  var conversationHistory = [];
  var MAX_HISTORY = 20; // Keep last 20 messages (10 exchanges) to stay within token limits

  function renderText(text) {
    if (!text) return '';
    var s = text;
    s = s.replace(/\*\*(.+?)\*\*/g, '$1');
    s = s.replace(/__(.+?)__/g, '$1');
    s = s.replace(/\*(.+?)\*/g, '$1');
    s = s.replace(/_(.+?)_/g, '$1');
    s = s.replace(/^#{1,6}\s+/gm, '');
    s = s.replace(/^[\-\*]\s+/gm, '- ');
    return s;
  }

  function makeCopyBtn(textToCopy) {
    var clipIcon = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
    var checkIcon = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>';
    var btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.title = 'Copy';
    btn.innerHTML = clipIcon;
    btn.addEventListener('click', function() {
      navigator.clipboard.writeText(textToCopy).then(function() {
        btn.innerHTML = checkIcon;
        btn.classList.add('copied');
        btn.title = 'Copied';
        setTimeout(function() { btn.innerHTML = clipIcon; btn.classList.remove('copied'); btn.title = 'Copy'; }, 1500);
      });
    });
    return btn;
  }

  function makeSpeakBtn(text) {
    var playIcon = '<svg viewBox="0 0 24 24"><polygon points="7 4 19 12 7 20"></polygon></svg>';
    var pauseIcon = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>';
    var btn = document.createElement('button');
    btn.className = 'speak-btn';
    btn.title = 'Play';
    btn.setAttribute('aria-label', 'Play spoken reply');
    btn.innerHTML = playIcon;
    btn.addEventListener('click', function() {
      // This button owns the current audio and it's playing -> pause (keep position)
      if (currentAudioBtn === btn && currentAudio && !currentAudio.paused && !currentAudio.ended) {
        try { currentAudio.pause(); } catch(e) {}
        btn._reset();
        return;
      }
      // This button owns the current audio and it's paused -> resume
      if (currentAudioBtn === btn && currentAudio && currentAudio.paused && !currentAudio.ended) {
        try { currentAudio.play(); btn._active(); } catch(e) {}
        return;
      }
      // Otherwise fetch fresh audio (speak() stops any other active playback first)
      speak(text, btn);
    });
    btn._reset = function() { btn.innerHTML = playIcon; btn.classList.remove('playing'); btn.title = 'Play'; btn.setAttribute('aria-label', 'Play spoken reply'); };
    btn._active = function() { btn.innerHTML = pauseIcon; btn.classList.add('playing'); btn.title = 'Pause'; btn.setAttribute('aria-label', 'Pause spoken reply'); };
    return btn;
  }

  function addMsg(text, type) {
    var div = document.createElement('div');
    div.className = 'msg ' + type;
    if (type === 'bot typing') {
      div.innerHTML = '<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
    } else {
      var rendered = renderText(text);
      div.textContent = rendered;
      if (type === 'bot') {
        var actions = document.createElement('div');
        actions.className = 'msg-actions';
        actions.appendChild(makeSpeakBtn(rendered));
        actions.appendChild(makeCopyBtn(rendered));
        div.appendChild(actions);
      }
    }
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  var WELCOME_TEXT = 'Welcome to Spacefaring Ventures. My name is Ada and I\u2019m an AI assistant that provides general information about our firm. Nothing here constitutes financial, investment, or legal advice, and no information provided should be relied upon for investment decisions. For formal inquiries, please email ir@spacefaring.ventures.\n\nHow can I help you today?';

  // Restore conversation from widget pop-out, or render the welcome message
  (function bootstrapMessages() {
    try {
      var ts = localStorage.getItem('ada-popout-ts');
      if (ts && (Date.now() - parseInt(ts, 10)) <= 30000) {
        var savedHistory = localStorage.getItem('ada-popout-history');
        var savedMsgs = localStorage.getItem('ada-popout-messages');
        // Clear immediately so a page refresh starts fresh
        localStorage.removeItem('ada-popout-history');
        localStorage.removeItem('ada-popout-messages');
        localStorage.removeItem('ada-popout-ts');
        if (savedHistory && savedMsgs) {
          var histArr = JSON.parse(savedHistory);
          var msgArr = JSON.parse(savedMsgs);
          if (histArr.length) {
            conversationHistory = histArr;
            if (conversationHistory.length > MAX_HISTORY) {
              conversationHistory = conversationHistory.slice(-MAX_HISTORY);
            }
            for (var i = 0; i < msgArr.length; i++) {
              addMsg(msgArr[i].text, msgArr[i].role === 'user' ? 'user' : 'bot');
            }
            return;
          }
        }
      }
    } catch(e) {}
    // No saved state: show the standard welcome (with speak + copy buttons)
    addMsg(WELCOME_TEXT, 'bot');
  })();

  async function send(opts) {
    opts = opts || {};
    var q = questionInput.value.trim();
    if (!q) return;
    questionInput.value = '';
    sendBtn.disabled = true;
    addMsg(q, 'user');
    conversationHistory.push({ role: 'user', content: q });
    if (conversationHistory.length > MAX_HISTORY) {
      conversationHistory = conversationHistory.slice(-MAX_HISTORY);
    }
    var typing = addMsg('', 'bot typing');
    try {
      var res = await fetch(API + '/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ question: q, history: conversationHistory })
      });
      var data = await res.json();
      typing.remove();
      var answer = data.error || data.answer;
      var botDiv = addMsg(answer, 'bot');
      conversationHistory.push({ role: 'assistant', content: answer });
      // Auto-speak when voice toggle is on OR when the question came from voice input
      if (opts.fromVoice) {
        var speakBtn = botDiv.querySelector('.speak-btn');
        speak(answer, speakBtn);
      }
    } catch (err) {
      typing.remove();
      addMsg('Connection interrupted. Please try again.', 'bot');
    }
    sendBtn.disabled = false;
    questionInput.focus();
  }

  sendBtn.addEventListener('click', function() { send(); });
  questionInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  /* ========================================================================
   * VOICE INTEGRATION
   * - Mic records via MediaRecorder, converts to 16-bit PCM WAV (xAI's byte
   *   sniffer is strict), uploads to /voice/stt with a vocabulary prompt hint,
   *   normalizes phonetic mishearings of "Spacefaring Ventures", auto-sends.
   * - Mic-initiated turns always get a spoken reply via xAI TTS.
   * - Typed turns are silent by default; per-message play buttons let the
   *   user hear any bot reply on demand.
   * ====================================================================== */
  var recorder = null, recStream = null, recChunks = [], recMime = '';
  var currentAudio = null, currentAudioBtn = null, currentAudioUrl = null;
  var currentReader = null, currentAbort = null;

  var STT_PROMPT = 'This is a question for Ada at Spacefaring Ventures, an investment firm focused on space technology. Common vocabulary: Spacefaring Ventures, Fund I, Fund II, Fund III, Anish Philip Chacko, limited partner, general partner, capital call, portfolio company, SpaceX, Rocket Lab, Relativity Space, Stoke Space, K2 Space, ir@spacefaring.ventures, spacefaring.ventures.';

  function normalizeFirmName(text) {
    if (!text) return text;
    var rules = [
      [/\bspace[\s\-]?star[\s\-]?ventures?\b/gi, 'Spacefaring Ventures'],
      [/\bspace[\s\-]?fair[i]?ng[\s\-]?ventures?\b/gi, 'Spacefaring Ventures'],
      [/\bspace[\s\-]?faring[\s\-]?ventures?\b/gi, 'Spacefaring Ventures'],
      [/\bspace[\s\-]?fearing[\s\-]?ventures?\b/gi, 'Spacefaring Ventures'],
      [/\bspace[\s\-]?sparing[\s\-]?ventures?\b/gi, 'Spacefaring Ventures'],
      [/\bspace[\s\-]?bearing[\s\-]?ventures?\b/gi, 'Spacefaring Ventures'],
      [/\bspace[\s\-]?star\b(?=.{0,40}(invest|fund|venture|firm|lp|gp|portfolio))/gi, 'Spacefaring'],
      [/\bspacestar\b/gi, 'Spacefaring']
    ];
    var out = text;
    for (var i = 0; i < rules.length; i++) out = out.replace(rules[i][0], rules[i][1]);
    return out;
  }

  /* Encode an AudioBuffer as 16-bit PCM WAV for xAI STT's strict byte sniffer. */
  function audioBufferToWav(buffer) {
    var numCh = buffer.numberOfChannels, sampleRate = buffer.sampleRate, length = buffer.length;
    var blockAlign = numCh * 2, dataSize = length * blockAlign, totalSize = 44 + dataSize;
    var ab = new ArrayBuffer(totalSize), view = new DataView(ab);
    function str(off, s) { for (var i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); }
    str(0, 'RIFF'); view.setUint32(4, totalSize - 8, true); str(8, 'WAVE');
    str(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
    view.setUint16(22, numCh, true); view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * blockAlign, true); view.setUint16(32, blockAlign, true); view.setUint16(34, 16, true);
    str(36, 'data'); view.setUint32(40, dataSize, true);
    var chans = [];
    for (var c = 0; c < numCh; c++) chans.push(buffer.getChannelData(c));
    var off = 44;
    for (var i = 0; i < length; i++) {
      for (var c = 0; c < numCh; c++) {
        var s = Math.max(-1, Math.min(1, chans[c][i]));
        view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
        off += 2;
      }
    }
    return new Blob([ab], { type: 'audio/wav' });
  }

  async function convertToWav(blob) {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) throw new Error('AudioContext not supported');
    var ac = new Ctx();
    try {
      var ab = await blob.arrayBuffer();
      var decoded = await ac.decodeAudioData(ab.slice(0));
      return audioBufferToWav(decoded);
    } finally { try { await ac.close(); } catch(e) {} }
  }

  function setMicState(state) {
    if (!micBtn) return;
    micBtn.classList.remove('recording', 'transcribing');
    if (state === 'recording' || state === 'transcribing') micBtn.classList.add(state);
  }

  function cleanupStream() {
    if (recStream) { recStream.getTracks().forEach(function(t) { t.stop(); }); recStream = null; }
  }

  async function startRecording() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || typeof MediaRecorder === 'undefined') {
      addMsg('Voice input is not supported in this browser.', 'bot');
      return;
    }
    try {
      stopSpeaking();
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      var candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus', 'audio/mp4'];
      recMime = '';
      for (var i = 0; i < candidates.length; i++) {
        if (MediaRecorder.isTypeSupported(candidates[i])) { recMime = candidates[i]; break; }
      }
      recorder = recMime ? new MediaRecorder(recStream, { mimeType: recMime }) : new MediaRecorder(recStream);
      recChunks = [];
      recorder.ondataavailable = function(e) { if (e.data && e.data.size) recChunks.push(e.data); };
      recorder.onstop = function() {
        cleanupStream();
        var blob = new Blob(recChunks, { type: recMime || 'audio/webm' });
        recChunks = [];
        transcribeAndSend(blob);
      };
      recorder.start();
      setMicState('recording');
      questionInput.placeholder = 'Listening...';
      micBtn.setAttribute('aria-label', 'Stop recording');
    } catch(err) {
      cleanupStream();
      setMicState('idle');
      questionInput.placeholder = 'Ask a question about Spacefaring Ventures...';
      if (err && err.name === 'NotAllowedError') {
        addMsg('Microphone access was blocked. Enable it in your browser settings to use voice.', 'bot');
      } else {
        addMsg('Could not access the microphone. Please try again.', 'bot');
      }
    }
  }

  function stopRecording() {
    if (recorder && recorder.state === 'recording') recorder.stop();
  }

  async function transcribeAndSend(blob) {
    setMicState('transcribing');
    questionInput.placeholder = 'Transcribing...';
    micBtn.setAttribute('aria-label', 'Transcribing');
    try {
      var uploadBlob = blob, filename = 'recording.webm';
      try { uploadBlob = await convertToWav(blob); filename = 'recording.wav'; } catch(e) {
        filename = (blob.type.indexOf('mp4') >= 0 ? 'recording.m4a' : (blob.type.indexOf('ogg') >= 0 ? 'recording.ogg' : 'recording.webm'));
      }
      var form = new FormData();
      form.append('file', uploadBlob, filename);
      form.append('model', 'grok-voice-stt');
      form.append('language', 'en');
      form.append('prompt', STT_PROMPT);
      var r = await fetch(API + '/voice/stt', { method: 'POST', body: form });
      var j = {};
      try { j = await r.json(); } catch(e) {}
      var text = j.text || j.transcript || j.transcription || '';
      text = normalizeFirmName(text.trim());
      setMicState('idle');
      questionInput.placeholder = 'Ask a question about Spacefaring Ventures...';
      micBtn.setAttribute('aria-label', 'Record voice question');
      if (!text) {
        addMsg('I didn\u2019t catch that. Please try again.', 'bot');
        return;
      }
      questionInput.value = text;
      send({ fromVoice: true });
    } catch(err) {
      setMicState('idle');
      questionInput.placeholder = 'Ask a question about Spacefaring Ventures...';
      micBtn.setAttribute('aria-label', 'Record voice question');
      addMsg('Connection interrupted. Please try again.', 'bot');
    }
  }

  if (micBtn) {
    micBtn.addEventListener('click', function() {
      if (recorder && recorder.state === 'recording') stopRecording();
      else startRecording();
    });
  }

  function stopSpeaking() {
    // Abort any in-flight fetch so we stop pulling bytes from the Worker.
    if (currentAbort) { try { currentAbort.abort(); } catch(e) {} currentAbort = null; }
    // Cancel the streaming reader so pump() exits cleanly.
    if (currentReader) { try { currentReader.cancel(); } catch(e) {} currentReader = null; }
    if (currentAudio) {
      try { currentAudio.pause(); } catch(e) {}
      currentAudio = null;
    }
    if (currentAudioBtn && currentAudioBtn._reset) currentAudioBtn._reset();
    currentAudioBtn = null;
    if (currentAudioUrl) { try { URL.revokeObjectURL(currentAudioUrl); } catch(e) {} currentAudioUrl = null; }
  }

  function canStreamMp3() {
    try {
      return typeof MediaSource !== 'undefined'
        && typeof MediaSource.isTypeSupported === 'function'
        && MediaSource.isTypeSupported('audio/mpeg');
    } catch(e) { return false; }
  }

  async function speak(text, btn) {
    if (!text) return;
    stopSpeaking();
    if (btn && btn._active) btn._active();
    currentAudioBtn = btn || null;
    try {
      var fetchOpts = {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text.slice(0, 1800), language: 'en' })
      };
      try { currentAbort = new AbortController(); fetchOpts.signal = currentAbort.signal; }
      catch(e) { currentAbort = null; }
      var r = await fetch(API + '/voice/tts', fetchOpts);
      if (!r.ok) { stopSpeaking(); return; }
      // Prefer streaming playback (starts on first chunk) when the browser
      // supports MediaSource + audio/mpeg. Fall back to a buffered Blob URL
      // for Safari/older browsers that don't.
      if (canStreamMp3() && r.body && typeof r.body.getReader === 'function') {
        await playStreaming(r);
      } else {
        await playBuffered(r);
      }
    } catch(e) { stopSpeaking(); }
  }

  async function playBuffered(response) {
    var blob = await response.blob();
    currentAudioUrl = URL.createObjectURL(blob);
    var audio = new Audio(currentAudioUrl);
    currentAudio = audio;
    audio.onended = function() { stopSpeaking(); };
    audio.onerror = function() { stopSpeaking(); };
    try { await audio.play(); } catch(e) { /* autoplay blocked */ stopSpeaking(); }
  }

  function playStreaming(response) {
    return new Promise(function(resolve) {
      var ms = new MediaSource();
      currentAudioUrl = URL.createObjectURL(ms);
      var audio = new Audio(currentAudioUrl);
      audio.preload = 'auto';
      currentAudio = audio;
      audio.onended = function() { stopSpeaking(); };
      audio.onerror = function() { stopSpeaking(); };
      ms.addEventListener('sourceopen', function onOpen() {
        ms.removeEventListener('sourceopen', onOpen);
        var sb;
        try { sb = ms.addSourceBuffer('audio/mpeg'); }
        catch(e) { stopSpeaking(); resolve(); return; }
        try { sb.mode = 'sequence'; } catch(e) {}
        var reader;
        try { reader = response.body.getReader(); }
        catch(e) { stopSpeaking(); resolve(); return; }
        currentReader = reader;
        var queue = [];
        var reading = true;
        var appending = false;
        var started = false;

        function flush() {
          if (appending || sb.updating) return;
          if (queue.length === 0) {
            if (!reading && ms.readyState === 'open') {
              try { ms.endOfStream(); } catch(e) {}
            }
            return;
          }
          appending = true;
          try { sb.appendBuffer(queue.shift()); }
          catch(e) { appending = false; stopSpeaking(); }
        }

        sb.addEventListener('updateend', function() {
          appending = false;
          if (!started) {
            started = true;
            audio.play().then(function() { resolve(); }).catch(function() {
              /* autoplay blocked - user can click replay */
              stopSpeaking(); resolve();
            });
          }
          flush();
        });

        (function pump() {
          reader.read().then(function(chunk) {
            if (chunk.done) { reading = false; flush(); return; }
            queue.push(chunk.value);
            flush();
            pump();
          }).catch(function() { reading = false; try { flush(); } catch(e) {} });
        })();
      }, { once: true });
    });
  }
})();
</script>
</body>
</html>
